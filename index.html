<!DOCTYPE html>
<html lang="zh-CN" x-data="epubReader()" x-init="init()" :data-theme="theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <meta name="translator" content="no">
    <title>Nano EPUB Reader</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</head>
<body>
    <!-- 欢迎界面 -->
    <div id="welcome" class="welcome" x-show="!bookLoaded" x-transition.opacity.duration.300ms>
        <h1>📖 Nano EPUB Reader</h1>
        <p>极简 PC 端 EPUB 阅读器</p>
        <div 
            class="upload-area" 
            :class="{ 'dragover': dragOver }"
            @click="$refs.fileInput.click()"
            @dragover.prevent="dragOver = true"
            @dragleave.prevent="dragOver = false"
            @drop.prevent="handleDrop($event)"
        >
            <input type="file" x-ref="fileInput" accept=".epub" @change="handleFileSelect($event)" hidden>
            <div class="upload-hint">
                <span class="icon">📚</span>
                <p>点击或拖拽 EPUB 文件到此处</p>
            </div>
        </div>
    </div>

    <!-- 阅读器界面 -->
    <div id="reader" class="reader" x-show="bookLoaded" x-transition.opacity.duration.300ms>
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>📑 目录</h3>
                <button class="btn-small" @click="collapseAll()" title="全部收起">−</button>
                <button class="btn-small" @click="expandAll()" title="全部展开">+</button>
            </div>
            <ul class="toc-list">
                <template x-for="(item, index) in toc" :key="index">
                    <li 
                        class="toc-item" 
                        :class="{ 'active': currentSpineIndex === item.spineIndex }"
                        :style="`padding-left: ${12 + item.level * 16}px`"
                    >
                        <div class="toc-item-header" @click="item.children.length ? toggleItem(item) : loadChapter(item.spineIndex)">
                            <span 
                                class="toc-toggle" 
                                :class="{ 
                                    'has-children': item.children.length, 
                                    'empty': !item.children.length,
                                    'collapsed': item.collapsed 
                                }"
                                @click.stop="item.children.length && toggleItem(item)"
                                x-text="item.children.length ? '▼' : ''"
                            ></span>
                            <span class="toc-label" x-text="item.label" :title="item.label"></span>
                        </div>
                        <!-- 子目录 -->
                        <ul class="toc-children" x-show="!item.collapsed" x-collapse.duration.200ms>
                            <template x-for="(child, cIdx) in item.children" :key="cIdx">
                                <li 
                                    class="toc-item" 
                                    :class="{ 'active': currentSpineIndex === child.spineIndex }"
                                    @click="loadChapter(child.spineIndex)"
                                >
                                    <div class="toc-item-header" style="padding-left: 30px">
                                        <span class="toc-toggle empty"></span>
                                        <span class="toc-label" x-text="child.label" :title="child.label"></span>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </li>
                </template>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部工具栏 -->
            <header class="toolbar">
                <button class="btn" @click="closeBook()">← 返回</button>
                <span class="book-title" x-text="bookTitle || 'Nano EPUB Reader'"></span>
                <div class="toolbar-right">
                    <button class="btn" @click="cycleTheme()" x-text="themeIcon + ' 主题'"></button>
                    <button class="btn" @click="settingsOpen = !settingsOpen">A 字号</button>
                </div>
            </header>

            <!-- 阅读区域 -->
            <main class="reading-area" x-ref="readingArea">
                <div class="viewer" x-ref="viewer" :style="viewerStyle"></div>
            </main>

            <!-- 底部章节导航 -->
            <footer class="bottom-nav">
                <button class="nav-btn" @click="prevChapter()" :disabled="currentSpineIndex <= 0">‹ 上一章</button>
                <span class="nav-progress" x-text="`${currentSpineIndex + 1} / ${spineItems.length}`"></span>
                <button class="nav-btn" @click="nextChapter()" :disabled="currentSpineIndex >= spineItems.length - 1">下一章 ›</button>
            </footer>
        </div>
    </div>

    <!-- 设置面板 -->
    <div id="fontPanel" class="font-panel" x-show="settingsOpen" @click.outside="settingsOpen = false" x-transition.opacity.scale.duration.200ms>
        <button class="btn" @click="fontSize -= 1">A-</button>
        <span x-text="fontSize"></span>
        <button class="btn" @click="fontSize += 1">A+</button>
        <span class="panel-divider">|</span>
        <button class="btn" @click="readerWidth -= 50">◀</button>
        <span x-text="readerWidth + 'px'"></span>
        <button class="btn" @click="readerWidth += 50">▶</button>
    </div>

    <!-- 依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
